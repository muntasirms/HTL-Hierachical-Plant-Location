# ──────────────────────────────────────────────────────────────────
# CO₂ Post-Hoc scenario — optimise cost, report CO₂ after
# ──────────────────────────────────────────────────────────────────
# Identical to baseline economics, but with CO₂ tracking enabled.
# The optimizer minimises economic cost as usual.  CO₂ is computed
# from the cost-optimised layout and reported alongside.
# ──────────────────────────────────────────────────────────────────
name: co2_post_hoc
description: >
  Optimise for minimum system cost (baseline economics).  CO₂ emissions
  are computed post-hoc from the resulting plant layout and assignments.
  Use this to see the carbon footprint of the cost-optimal solution.

data:
  feedstock_file: data/WWTPs.csv
  feedstock_unit: MMGal/day
  convertible_fraction: 0.01
  lat_column: latitude
  lon_column: longitude
  scale_column: scale

model:
  num_candidate_plants: 50
  initialization: top_feedstock

economics:
  transport_cost_per_unit_km: 138.8
  tipping_fee:
    mode: uniform_random
    random_min: -75.0
    random_max: -25.0
  capital_cost_coef: 0.68
  capital_cost_exponent: 0.6
  revenue_coef: 1657.89
  revenue_exponent: 1.0
  orphan_penalty: 50.0

emissions:
  enabled: true
  mode: post_hoc                               # optimise cost, report CO₂
  co2_transport_per_unit_km: 0.25              # kg CO₂ per feedstock-unit per km
  co2_orphan_per_unit: 5.0                     # kg CO₂ per unit left unprocessed
  co2_processing_per_unit: 2.0                 # kg CO₂ per unit processed
  co2_fuel_displacement_credit: -3.5           # kg CO₂ avoided per unit (negative = credit)
  co2_capital_per_unit: 0.0                    # embodied carbon (optional)
  co2_capital_exponent: 1.0
  co2_cost_weight: 0.05                        # not used in post_hoc mode

solver:
  num_epochs: 100000
  learning_rate: 0.01
  convergence_tol: 1.0e-7
  min_epochs: 5000
  log_interval: 500
  scheduler_enabled: false

constraints: []
